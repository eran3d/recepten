<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recepten — Eran</title>
  <meta name="description" content="Verzameling recepten, importeerbaar in Pestle.">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <h1>🍳 Recepten</h1>
      <p>Deel een recept-URL naar Pestle om te importeren.</p>
    </header>

    <div class="recipe-grid">
      <!-- RECIPES:START -->
      <a class="recipe-card" href="/de-beste-huisgemaakte-butter-chicken/">
        <img src="/de-beste-huisgemaakte-butter-chicken/hero.jpg" alt="De beste huisgemaakte Butter Chicken" loading="lazy">
        <div class="card-body">
          <h2>De beste huisgemaakte Butter Chicken</h2>
          <p class="meta">Hoofdgerecht · 55 min</p>
        </div>
      </a>
      <a class="recipe-card" href="/overnight-oats-pindakaas-chocolade/">
        <img src="/overnight-oats-pindakaas-chocolade/hero.jpg" alt="Overnight oats met pindakaas en chocolade" loading="lazy">
        <div class="card-body">
          <h2>Overnight oats met pindakaas en chocolade</h2>
          <p class="meta">Ontbijt · 6+ uur</p>
        </div>
      </a>
      <!-- RECIPES:END -->
    </div>

    <p class="empty-state" id="empty">Nog geen recepten — stuur Jarvis een screenshot.</p>

    <footer>Gegenereerd door Jarvis · gehost op Cloudflare Workers</footer>
  </div>
  <script>
    if (document.querySelector('.recipe-card')) document.getElementById('empty').remove();
  </script>
</body>
</html>
