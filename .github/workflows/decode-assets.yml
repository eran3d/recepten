name: Decode binary assets

# Jarvis kan vanuit Cowork alleen tekst pushen (GitHub MCP).
# Binaire assets (hero.jpg) worden als base64 gepusht en hier gedecodeerd.
# Grote files worden gesplitst: <naam>.b64part1..N (geen trigger) + <naam>.b64
# (laatste chunk, triggert deze workflow). Volgorde: part1..N, dan de .b64 zelf.

on:
  push:
    branches: [main]
    paths: ["**/*.b64"]

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode alle .b64 files (incl. gesplitste delen)
        run: |
          find . -name "*.b64" -not -path "./.git/*" | while read f; do
            base="${f%.b64}"
            if ls "${f}part"* >/dev/null 2>&1; then
              cat $(ls "${f}part"* | sort -V) "$f" | base64 -d > "$base"
              rm "${f}part"*
            else
              base64 -d "$f" > "$base"
            fi
            rm "$f"
            echo "decoded: $base"
          done
      - name: Commit resultaat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "CI: decode binary assets" && git push)
